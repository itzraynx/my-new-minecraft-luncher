name: All OS

on: push

env:
  CARGO_TERM_COLOR: always

jobs:
  mac_universal:
    defaults:
      run:
        working-directory: ./GDL
    runs-on: macos-13
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v3
        with:
          path: GDL
      - uses: actions/setup-node@v3
        with:
          node-version: "22.12.0"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.1
          targets: aarch64-apple-darwin, x86_64-apple-darwin
          components: clippy, rustfmt
      - name: Prepare
        run: |
          echo "" > crates/carbon_repos/src/db.rs
          cargo fmt --check
      - run: |
          npm run sudo-init
          chmod -R a+x node_modules
      - name: Iridium patchfix
        run: node iridium_patchfix.js
      - name: Prisma codegen
        env:
          CARGO_INCREMENTAL: 0
        run: pnpm prisma:generate
      - name: Build
        run: pnpm build:mac-universal
        env:
          CARGO_INCREMENTAL: 0
          BASE_API: ${{ vars.BASE_API }}
          TEST_BASE_API: ${{ vars.TEST_BASE_API }}
          MS_AUTH_CLIENT_ID: ${{ vars.MS_AUTH_CLIENT_ID }}
          META_BASE_URL: ${{ vars.META_BASE_URL }}
          USER_AGENT_PREFIX: ${{ vars.USER_AGENT_PREFIX }}
          CURSEFORGE_API_KEY: "${{ vars.CURSEFORGE_API_KEY }}"
          CURSEFORGE_API_BASE: ${{ vars.CURSEFORGE_API_BASE }}
      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint
      - name: Clear target before tests to avoid folder getting too big
        run: rm -rf target
      - name: Test
        env:
          CARGO_INCREMENTAL: 0
          BASE_API: ${{ vars.BASE_API }}
          TEST_BASE_API: ${{ vars.TEST_BASE_API }}
          MS_AUTH_CLIENT_ID: ${{ vars.MS_AUTH_CLIENT_ID }}
          RUNTIME_PATH: ${{ vars.RUNTIME_PATH }}
          META_BASE_URL: ${{ vars.META_BASE_URL }}
          USER_AGENT_PREFIX: ${{ vars.USER_AGENT_PREFIX }}
          CURSEFORGE_API_KEY: "${{ vars.CURSEFORGE_API_KEY }}"
          CURSEFORGE_API_BASE: ${{ vars.CURSEFORGE_API_BASE }}
        run: pnpm test:all
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-macos
          path: ./GDL/apps/desktop/playwright-report/
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-macos
          path: ./GDL/apps/desktop/test-results/
      - name: Upload main.log for debugging
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-macos
          path: |
            ./GDL/apps/desktop/release/mac-universal/gdl_data/main.log
            ./GDL/apps/desktop/release/mac-universal/gdl_data/data/__gdl_logs__/*.log
      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1
  ubuntu_x64:
    defaults:
      run:
        working-directory: ./GDL
    runs-on: ubuntu-22.04
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v3
        with:
          path: GDL
      - uses: actions/setup-node@v3
        with:
          node-version: "22.12.0"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.1
          targets: x86_64-unknown-linux-gnu
          components: clippy, rustfmt
      - name: Prepare
        run: |
          echo "" > crates/carbon_repos/src/db.rs
          cargo fmt --check
      - run: |
          npm run sudo-init
          chmod -R a+x node_modules
      - name: Iridium patchfix
        run: node iridium_patchfix.js
      - name: Prisma codegen
        env:
          CARGO_INCREMENTAL: 0
        run: pnpm prisma:generate:linux-x64
      - name: Build
        run: pnpm build:linux-x64
        env:
          CARGO_INCREMENTAL: 0
          BASE_API: ${{ vars.BASE_API }}
          TEST_BASE_API: ${{ vars.TEST_BASE_API }}
          MS_AUTH_CLIENT_ID: ${{ vars.MS_AUTH_CLIENT_ID }}
          META_BASE_URL: ${{ vars.META_BASE_URL }}
          USER_AGENT_PREFIX: ${{ vars.USER_AGENT_PREFIX }}
          CURSEFORGE_API_KEY: "${{ vars.CURSEFORGE_API_KEY }}"
          CURSEFORGE_API_BASE: ${{ vars.CURSEFORGE_API_BASE }}
      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint
      - name: Clear target before tests to avoid folder getting too big
        run: rm -rf target
      - name: Test
        env:
          DISPLAY: ":1"
          CARGO_INCREMENTAL: 0
          BASE_API: ${{ vars.BASE_API }}
          TEST_BASE_API: ${{ vars.TEST_BASE_API }}
          MS_AUTH_CLIENT_ID: ${{ vars.MS_AUTH_CLIENT_ID }}
          RUNTIME_PATH: ${{ vars.RUNTIME_PATH }}
          META_BASE_URL: ${{ vars.META_BASE_URL }}
          USER_AGENT_PREFIX: ${{ vars.USER_AGENT_PREFIX }}
          CURSEFORGE_API_KEY: "${{ vars.CURSEFORGE_API_KEY }}"
          CURSEFORGE_API_BASE: ${{ vars.CURSEFORGE_API_BASE }}
        run: |
          sudo apt-get install -y xvfb
          /usr/bin/Xvfb :1 -screen 0 1280x960x24 &
          export DISPLAY=:1
          sleep 5
          ps aux | grep Xvfb
          ls -l /tmp/.X11-unix/
          echo "DISPLAY=$DISPLAY"
          pnpm test:all
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./GDL/apps/desktop/playwright-report/
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: ./GDL/apps/desktop/test-results/
      - name: Upload main.log for debugging
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-linux
          path: |
            ./GDL/apps/desktop/release/linux-unpacked/gdl_data/main.log
            ./GDL/apps/desktop/release/linux-unpacked/gdl_data/data/__gdl_logs__/*.log
      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1
  windows_x64:
    defaults:
      run:
        working-directory: ./GDL
    runs-on: windows-2022
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v3
        with:
          path: GDL
      - uses: actions/setup-node@v3
        with:
          node-version: "22.12.0"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.1
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt
      - name: Install scoop and llvm
        run: |
          Invoke-Expression (New-Object System.Net.WebClient).DownloadString('https://get.scoop.sh')
          scoop install llvm
      - name: Prepare
        shell: bash
        run: |
          echo "" > crates/carbon_repos/src/db.rs
          cargo fmt --check
      - name: init
        shell: bash
        run: npm run init
      - name: Iridium patchfix
        shell: bash
        run: node iridium_patchfix.js
      - name: Prisma codegen
        shell: bash
        env:
          CARGO_INCREMENTAL: 0
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: pnpm prisma:generate:win-x64
      - name: Build
        shell: bash
        run: pnpm build:win-x64
        env:
          CARGO_INCREMENTAL: 0
          BASE_API: ${{ vars.BASE_API }}
          TEST_BASE_API: ${{ vars.TEST_BASE_API }}
          MS_AUTH_CLIENT_ID: ${{ vars.MS_AUTH_CLIENT_ID }}
          META_BASE_URL: ${{ vars.META_BASE_URL }}
          USER_AGENT_PREFIX: ${{ vars.USER_AGENT_PREFIX }}
          CURSEFORGE_API_KEY: "${{ vars.CURSEFORGE_API_KEY }}"
          CURSEFORGE_API_BASE: ${{ vars.CURSEFORGE_API_BASE }}
          CARGO_NET_GIT_FETCH_WITH_CLI: true
      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: pnpm lint
      - name: Clear target before tests to avoid folder getting too big
        shell: bash
        run: rm -rf target
      - name: Test
        shell: bash
        env:
          CARGO_INCREMENTAL: 0
          BASE_API: ${{ vars.BASE_API }}
          TEST_BASE_API: ${{ vars.TEST_BASE_API }}
          MS_AUTH_CLIENT_ID: ${{ vars.MS_AUTH_CLIENT_ID }}
          RUNTIME_PATH: ${{ vars.RUNTIME_PATH }}
          META_BASE_URL: ${{ vars.META_BASE_URL }}
          USER_AGENT_PREFIX: ${{ vars.USER_AGENT_PREFIX }}
          CURSEFORGE_API_KEY: "${{ vars.CURSEFORGE_API_KEY }}"
          CURSEFORGE_API_BASE: ${{ vars.CURSEFORGE_API_BASE }}
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: pnpm test:all
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-win
          path: ./GDL/apps/desktop/playwright-report/
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-windows
          path: ./GDL/apps/desktop/test-results/
      - name: Upload main.log for debugging
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-windows
          path: |
            ./GDL/apps/desktop/release/win-unpacked/gdl_data/main.log
            ./GDL/apps/desktop/release/win-unpacked/gdl_data/data/__gdl_logs__/*.log
      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1
