name: Build Nokiatis Launcher

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CURSEFORGE_API_KEY: ""

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows EXE
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build prisma-cli (for generating db.rs)
        run: cargo build -p prisma-cli --release

      - name: Generate Prisma client (db.rs)
        run: cargo run -p prisma-cli --release -- generate --schema=./crates/carbon_repos/prisma/schema.prisma

      - name: Generate rspc bindings
        run: cargo run -p carbon_app -- --generate-ts-bindings
        continue-on-error: true

      - name: Build Rust backend
        run: cargo build -p carbon_app --release --target x86_64-pc-windows-msvc

      - name: Build frontend with Tauri
        run: pnpm build:win-x64
        continue-on-error: true

      - name: List release directory
        run: dir target\x86_64-pc-windows-msvc\release\ /s || echo "No release files found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-windows
          path: |
            target/x86_64-pc-windows-msvc/release/carbon_app.exe
            target/x86_64-pc-windows-msvc/release/bundle/
          retention-days: 30
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux AppImage
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build prisma-cli (for generating db.rs)
        run: cargo build -p prisma-cli --release

      - name: Generate Prisma client (db.rs)
        run: cargo run -p prisma-cli --release -- generate --schema=./crates/carbon_repos/prisma/schema.prisma

      - name: Generate rspc bindings
        run: cargo run -p carbon_app -- --generate-ts-bindings
        continue-on-error: true

      - name: Build Rust backend
        run: cargo build -p carbon_app --release --target x86_64-unknown-linux-gnu

      - name: Build frontend with Tauri
        run: pnpm build:linux-x64
        continue-on-error: true

      - name: List release directory
        run: ls -la target/x86_64-unknown-linux-gnu/release/ || echo "No release files found"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-linux
          path: |
            target/x86_64-unknown-linux-gnu/release/carbon_app
          retention-days: 30
          if-no-files-found: warn
