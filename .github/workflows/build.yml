name: Build Nokiatis Launcher

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Required environment variables for compile-time
  USER_AGENT_PREFIX: "NokiatisLauncher"
  MS_AUTH_CLIENT_ID: "00000000402b72ab"
  META_BASE_URL: "https://piston-meta.mojang.com"
  TEST_BASE_API: "https://test.gdlauncher.com"
  BASE_API: "https://api.gdlauncher.com"
  CURSEFORGE_API_KEY: ""

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows EXE
    timeout-minutes: 90
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.1
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Iridium patchfix
        run: node iridium_patchfix.js

      - name: Prisma codegen (native first, then use for cross-compile)
        run: |
          # Generate Prisma client using NATIVE toolchain (not cross-compiled)
          # The generated code is platform-independent Rust source code
          cargo run -p prisma-cli -- generate --schema=./crates/carbon_repos/prisma/schema.prisma

      - name: Build
        run: pnpm build:win-x64

      - name: List release directory
        run: |
          echo "=== Apps desktop release ==="
          dir apps\desktop\release\ /s || echo "No release files found"
          echo "=== Target release ==="
          dir target\release\ /s || echo "No target release files found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.zip
          retention-days: 30
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-22.04
    name: Build Linux AppImage
    timeout-minutes: 90
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.1
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Iridium patchfix
        run: node iridium_patchfix.js

      - name: Prisma codegen (native)
        run: |
          # Generate Prisma client using native toolchain
          # The generated code is platform-independent Rust source code
          cargo run -p prisma-cli -- generate --schema=./crates/carbon_repos/prisma/schema.prisma

      - name: Build
        run: pnpm build:linux-x64

      - name: List release directory
        run: |
          echo "=== Apps desktop release ==="
          ls -la apps/desktop/release/ || echo "No release files found"
          echo "=== Target release ==="
          ls -la target/release/ || echo "No target release files found"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.zip
          retention-days: 30
          if-no-files-found: warn
