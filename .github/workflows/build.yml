name: Build Nokiatis Launcher

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows EXE
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-rust

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma
        run: pnpm prisma:generate:win-x64

      - name: Generate RSPC bindings
        run: pnpm rspc-bindings:generate

      - name: Build Rust backend
        run: cargo build -p carbon_app --release --target x86_64-pc-windows-msvc

      - name: Build frontend
        run: pnpm build:win-x64
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.blockmap
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux AppImage
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-rust

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma
        run: pnpm prisma:generate:linux-x64

      - name: Generate RSPC bindings
        run: pnpm rspc-bindings:generate

      - name: Build Rust backend
        run: cargo build -p carbon_app --release --target x86_64-unknown-linux-gnu

      - name: Build frontend
        run: pnpm build:linux-x64
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-linux
          path: |
            apps/desktop/dist/*.AppImage
          retention-days: 30

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    name: Create Release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nokiatis-launcher-windows
          path: ./windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: nokiatis-launcher-linux
          path: ./linux

      - name: Get version
        id: version
        run: echo "VERSION=$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Nokiatis Launcher v${{ steps.version.outputs.VERSION }}
          body: |
            ## Nokiatis Launcher Release
            
            Built by Nokiatis Team
            
            ### Downloads
            - **Windows**: Download the .exe file below
            - **Linux**: Download the .AppImage file below
            
            ### Features
            - Discord Rich Presence integration
            - Modrinth mod support (no CurseForge API needed)
            - Microsoft & Offline account support
            - Modern dark theme UI
          files: |
            windows/*
            linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
