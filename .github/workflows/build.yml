name: Build Nokiatis Launcher

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CURSEFORGE_API_KEY: ""

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows EXE
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run codegen
        run: pnpm codegen
        continue-on-error: true

      - name: Build Rust backend
        run: cargo build -p carbon_app --release
        continue-on-error: true

      - name: Build frontend
        run: pnpm build:win-x64
        continue-on-error: true

      - name: List output files
        run: |
          ls -la apps/desktop/release/ 2>/dev/null || echo "No release dir"
          ls -la apps/desktop/dist/ 2>/dev/null || echo "No dist dir"
          ls -la target/release/ 2>/dev/null || echo "No target/release dir"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.zip
            target/release/carbon_app.exe
          retention-days: 30
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux AppImage
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9.13.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run codegen
        run: pnpm codegen
        continue-on-error: true

      - name: Build Rust backend
        run: cargo build -p carbon_app --release
        continue-on-error: true

      - name: Build frontend
        run: pnpm build:linux-x64
        continue-on-error: true

      - name: List output files
        run: |
          ls -la apps/desktop/release/ 2>/dev/null || echo "No release dir"
          ls -la apps/desktop/dist/ 2>/dev/null || echo "No dist dir"
          ls -la target/release/ 2>/dev/null || echo "No target/release dir"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nokiatis-launcher-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.zip
            target/release/carbon_app
          retention-days: 30
          if-no-files-found: warn
