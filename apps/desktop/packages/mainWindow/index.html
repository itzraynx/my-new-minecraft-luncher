      * {

        -webkit-font-smoothing: antialiased;

      /* View transition classes */

      @keyframes slide-out-to-left {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-100%);
        }
      }

      @keyframes slide-in-from-right {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0);
        }
      }

      @keyframes slide-out-to-right {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(100%);
        }
      }

      @keyframes slide-in-from-left {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(0);
        }
      }

      /* Base transitions for all view transitions */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 250ms;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        animation-fill-mode: both;
        will-change: transform;
        contain: paint;
      }

      .disable-view-transition {
        view-transition-name: disable-view-transition;
      }

      ::view-transition-old(disable-view-transition),
      ::view-transition-new(disable-view-transition) {
        animation-duration: 0s;
      }

      .slide-right-transition {
        view-transition-name: slide-right-transition;
      }

      .slide-left-transition {
        view-transition-name: slide-left-transition;
      }

      ::view-transition-old(slide-right-transition),
      ::view-transition-new(slide-right-transition) {
        animation-duration: 250ms;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        animation-fill-mode: both;
        will-change: transform;
        contain: paint;
      }

      ::view-transition-old(slide-left-transition),
      ::view-transition-new(slide-left-transition) {
        animation-duration: 250ms;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        animation-fill-mode: both;
        will-change: transform;
        contain: paint;
      }

      ::view-transition-old(slide-right-transition) {
        animation-name: slide-out-to-left;
      }

      ::view-transition-new(slide-right-transition) {
        animation-name: slide-in-from-right;
      }

      ::view-transition-old(slide-left-transition) {
        animation-name: slide-out-to-right;
      }

      ::view-transition-new(slide-left-transition) {
        animation-name: slide-in-from-left;
      }

      html,
      body {
        background: rgb(var(--darkSlate-800));
        color: white;
      }

      #root {
        /* transform: translateY(100%);

        will-change: transform; */

      *:not(#instance_logs_container *) {
        user-select: none;
        cursor: default;
      }

      #instance_logs_container * {
        user-select: text;
        cursor: auto;
        font-family: var(--font-mono);
      }

      *[data-cursor-pointer] {
        cursor: pointer !important;
      }

      input {
        cursor: text !important;
      }

      .instance-tile-spinning {
        background-image: linear-gradient(to right, transparent, transparent),
          conic-gradient(
            from var(--instance-tile-angle),
            rgb(var(--primary)) 0deg 90deg,
            transparent 90deg 180deg,
            transparent 180deg 270deg,
            transparent 270deg 360deg
          );
        background-origin: border-box;
        background-clip: padding-box, border-box;
      }

      @keyframes rotate {
        to {
          --instance-tile-angle: 360deg;
        }
      }

      .instance-tile-spinning {
        animation: rotate 4s linear infinite;
      }

      @property --instance-tile-angle {
        syntax: "<angle>";
        initial-value: 0deg;
        inherits: false;
      }

      @keyframes pulse-new-instance {
        0%,
        100% {
          outline-color: rgb(var(--primary-500));
        }
        50% {
          outline-color: transparent;
        }
      }

      .instance-tile-new {
        outline: 2px solid rgb(var(--primary-500));
        outline-offset: 0px;
        border-radius: 1rem;
        animation: pulse-new-instance 1.5s ease-in-out infinite;
      }

      .appFatalCrash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgb(var(--darkSlate-800));
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        z-index: 999999;
        font-size: 1.7rem;
        color: #fff;
        text-align: center;
        font-weight: 600;
      }
      .appFatalCrash * {
        user-select: text;
      }

      #news_article_content * {
        user-select: text;
        cursor: auto;
      }

      #news_article_content a {
        cursor: pointer !important;
      }

    <title>Nokiatis Launcher</title>
    <script type="module">
      import { mainTheme } from "@gd/ui"

      window.scrollRestoration = "manual"

      for (const key in mainTheme) {
        document.documentElement.style.setProperty(`--${key}`, mainTheme[key])
      }
      // TODO: handle sourcemaps decoding + sentry
      if (!import.meta.env.DEV) {
        // These errors can be safely ignored.
        // https://github.com/w3c/csswg-drafts/issues/5488
        // https://github.com/DevExpress/testcafe/issues/4857#issuecomment-598775956
        const resizeObserverErrors = [
          /ResizeObserver loop limit exceeded/,
          /ResizeObserver loop completed with undelivered notifications\./
        ]

        window.onerror = (msg, url, line, col, error) => {
          if (resizeObserverErrors.some((re) => re.test(msg))) {
            return
          }

          console.log(
            "Handling global uncaught error",
            msg,
            url,
            line,
            col,
            error
          )
          window.fatalError(msg, url.split("/").slice(-3).join(" -> "))
          return true
        }
      }
    </script>
    <script>
      function ensureAdVisibility() {
        const adContainer = document.querySelector(
          "main > div > div:nth-child(2)"
        )

        if (adContainer) {
          // Create a style element if it doesn't exist
          let style = document.getElementById("ad-visibility-style")
          if (!style) {
            style = document.createElement("style")
            style.id = "ad-visibility-style"
            document.head.appendChild(style)
          }

          style.textContent = `
            main > div > div:nth-child(2) {
              display: flex !important;
              flex-direction: column !important;
              justify-content: center !important;
              visibility: visible !important;
              opacity: 1 !important;
              width: auto !important;
              height: calc(100vh-100px) !important;
              position: static !important;
              transform: none !important;
              clip: auto !important;
              clip-path: none !important;
              max-height: none !important;
              overflow: visible !important;
              pointer-events: auto !important;
            }
          `

          if (!document.body.contains(adContainer)) {
            const parent = document.querySelector("main > div")
            if (parent) {
              parent.appendChild(adContainer)
            }
          }

          const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
              if (
                mutation.type === "attributes" &&
                mutation.attributeName === "style"
              ) {
                adContainer.removeAttribute("style")
              }
            })
          })

          observer.observe(adContainer, { attributes: true })
        }
      }

      // Run the check periodically
      // setInterval(ensureAdVisibility, 1000)

      // Also run the check when the page loads and when it's resized
      // window.addEventListener("load", ensureAdVisibility)
      // window.addEventListener("resize", ensureAdVisibility)
    </script>
